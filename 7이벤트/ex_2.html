<head>

    <title>Document</title>
    <style>
        .convert{

    <script>

        // button.addEventListener("click", change);

        //     document.body.classList.toggle('convert');
        // }

        button.addEventListener("click", () => { document.body.classList.toggle("convert"); });

    </script>
