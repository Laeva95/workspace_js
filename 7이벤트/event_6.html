<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #box {
            width: 200px;
            height: 200px;
            border: 1px solid #222;
        }
    </style>
</head>
<body>
    <!-- 
        마우스로 click 이벤트가 발생하면 클릭한 현재 HTML 문서 내의 x, y 좌표 알아내기
    -->
        <p>
            사각형 내부를 클릭해보세요.
        </p>

        <div id="box">

        </div>
    <script>
        const box = document.getElementById("box");
        
        box.addEventListener("click", (event) => {
            alert(`click 이벤트가 발생한 위치: ${event.pageX}, ${event.pageY}`);
        });


    </script>
</body>
</html>
