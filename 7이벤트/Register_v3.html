<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f6fb;
            color: #222;
        }

        .signup-container {
            max-width: 760px;
            margin: 40px auto;
            padding: 24px;
        }

        .signup-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            padding: 24px;
        }

        .signup-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .signup-table {
            width: 100%;
            border-collapse: collapse;
            background: transparent;
        }

        .signup-table td {
            padding: 10px;
            border: 1px solid #dce4ef;
            vertical-align: top;
        }

        .signup-table input[type="text"],
        .signup-table input[type="password"],
        .signup-table select,
        .signup-table textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cfd8e3;
            border-radius: 8px;
            font-size: 14px;
        }

        .signup-table textarea {
            min-height: 100px;
            resize: vertical;
        }

        .signup-table button,
        .signup-table input[type="button"] {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
        }

        .signup-table button:hover,
        .signup-table input[type="button"]:hover {
            background: #1d4ed8;
        }

        span {
            color: red;
        }

        @media (max-width: 600px) {
            .signup-container {
                padding: 16px;
                margin: 20px auto;
            }

            .signup-card {
                padding: 16px;
            }

            .signup-table td {
                display: block;
                width: 100%;
            }
        }
    </style>
</head>

<body>
  <div class="signup-container">
    <div class="signup-card">
      <div class="signup-title">회원가입</div>

      <table class="signup-table">
        <tr>
            <td colspan="2" align="center">회원가입</td>
        </tr>
        <tr>
            <td>*이름</td>
            <td>
                <input type="text" name="uName" id="uName" placeholder="김개똥" />
                <span id="name-error">이름을 입력해주세요</span>
            </td>
        </tr>
        <tr>
            <td>*ID</td>
            <td>
                <input type="text" name="uID" id="uID" placeholder="admin" />
                <span id="id-error">ID를 입력해주세요</span>
            </td>
        </tr>
        <tr>
            <td>*비밀번호</td>
            <td>
                <input type="password" name="uPWD" id="uPWD" placeholder="1234" />
                <span id="pwd-error">비밀번호를 입력해주세요</span>
            </td>
        </tr>
        <tr>
            <td>*비밀번호 확인</td>
            <td>
                <input type="password" name="uPWD_Confirm" id="uPWD_Confirm" />
                <span id="pwd-confirm-error">비밀번호 확인란을 입력해주세요</span>
            </td>
        </tr>
        <tr>
            <td>*직업</td>
            <td>
                <select name="work" id="work">
                    <option value="직업명" selected>직업명</option>
                    <option value="기타">기타</option>
                    <option value="회사원">회사원</option>
                    <option value="학생">학생</option>
                </select>
                <span id="work-error">직업 하나를 선택해 주세요</span>
            </td>
        </tr>
        <tr>
            <td>*성별</td>
            <td>
                남자<input type="radio" name="sex" id="s1" value="male" />
                여자<input type="radio" name="sex" id="s2" value="female" />
                <span id="gender-error">성별을 체크해 주세요</span>
            </td>
        </tr>
        <tr>
            <td>*취미</td>
            <td>
                <input type="checkbox" name="hobby" id="h1" value="독서" />독서
                <input type="checkbox" name="hobby" id="h2" value="등산" />등산
                <input type="checkbox" name="hobby" id="h3" value="낚시" />낚시
                <span id="hobby-error">취미를 하나 이상 체크 해 주세요</span>
            </td>
        </tr>
        <tr>
            <td>*가입동기</td>
            <td>
                <textarea rows="4" cols="50" name="motivation" id="motivation"
                    placeholder="가입동기를 두 줄 이상 입력 하시오."></textarea>
                <span id="motivation-error">가입 동기를 입력해주세요</span>
            </td>
        </tr>
        <tr>
            <td colspan="2" align="center">
                <input type="button" value="가입" id="submit-btn" />
            </td>
        </tr>
    </table>

    <script type="text/javascript">
        /*
            이벤트 연결 함수
                웹 브라우저가 Register_v3.html 웹문서의 모든 html 태그를 로드하면
                호출되는 함수로 기능은 다양한 입력 요소를 선택해서 이벤트 등록 후
                이벤트 핸들러 함수를 호출
        */

        // 이벤트 등록 함수 선언
        function setEventListeners (){
            // 이름 입력 input 요소를 선택해서 keyup 이벤트 등록 후 이벤트 핸들러 함수 호출
            document.getElementById("uName").addEventListener("keyup", validateName);

            // id 입력 input 요소를 선택해서 keyup 이벤트 등록 후 이벤트 핸들러 함수 호출
            document.getElementById("uID").addEventListener("keyup", validateID);

            // 비밀번호 입력 input 요소를 선택해서 keyup 이벤트 등록 후 이벤트 핸들러 함수 호출
            document.getElementById("uPWD").addEventListener("keyup", validatePassword);

            // 비밀번호 확인 입력 input 요소를 선택해서 keyup 이벤트 등록 후 이벤트 핸들러 함수 호출
            document.getElementById("uPWD_Confirm").addEventListener("keyup", validatePasswordConfirmation);

            // 직업 선택할 수 있는 select 요소를 선택해서 change 이벤트 등록 후 이벤트 핸들러 함수 호출
            document.getElementById("work").addEventListener("change", validateWork);

            // 성별을 선택할 수 있는 input 요소들을 선택해서 change 이벤트 등록 후 이벤트 핸들러 함수 호출
            document.getElementsByName("sex").forEach((e) => e.addEventListener("change", validateGender));
            
            // 취미를 선택할 수 있는 input 요소들을 선택해서 change 이벤트 등록 후 이벤트 핸들러 함수 호출
            document.getElementsByName("hobby").forEach((e) => e.addEventListener("change", validateHobby));

            // 가입 동기를 입력할 수 있는 textarea 요소를 선택해서 keyup 이벤트 등록 후 이벤트 핸들러 함수 호출
            document.getElementById("motivation").addEventListener("keyup", validateMotivation);

            // 최종 제출 버튼을 클릭하면 전체 입력 검사를 하는 함수 호출
            document.getElementById("submit-btn").addEventListener("click", validateForm);

        }

        // 전체 폼 양식 검사 함수
        function validateForm(){
            // 배열을 만들어서 각 검사 함수를 호출하여 true 또는 false 반환
            let results = [
                validateName(), 
                validateID(), 
                validatePassword(), 
                validatePasswordConfirmation(), 
                validateWork(),
                validateGender(), 
                validateHobby(), 
                validateMotivation()
            ];

            // 모든 배열의 값이 true라면 가입 신청 성공
            if(results.every(e => e)){
                alert("가입 신청 성공!");
            } 
            // 배열의 값 중 하나라도 false가 있다면 가입 신청 실패
            else{
                alert("가입 신청 실패! 모든 값을 정확하게 입력해주세요");
            }
        }

        // 개별 입력 요소 유효성 검사
        function validateName(){
            // 공통 검사 함수 validateField를 재사용
            // "uName" 입력 값을 검사하고, 오류는 id="name-error"에 표시, 3~7자, 표시되는 이름은 "이름"
            return validateField("uName", "name-error", 3, 7, "이름");
        }

        function validateID(){
            // 공통 검사 함수 validateField를 재사용
            return validateField("uID", "id-error", 3, 7, "아이디");
        }

        function validatePassword(){
            // 공통 검사 함수 validateField를 재사용
            validatePasswordConfirmation();
            return validateField("uPWD", "pwd-error", 3, 7, "비밀번호");
        }

        function validatePasswordConfirmation(){
            let inputPWD = document.getElementById("uPWD").value.trim();
            let inputPWDConfirm = document.getElementById("uPWD_Confirm").value.trim();

            let errorMessage = document.getElementById("pwd-confirm-error");

            // 비밀번호 확인을 입력하지 않았을 경우
            if(inputPWDConfirm === ""){
                errorMessage.innerHTML = "<strong>비밀번호 확인을 입력해주세요</strong>";
                return false;
            }
            // 비밀번호와 비밀번호 확인이 다를 경우
            else if(inputPWD !== inputPWDConfirm){
                errorMessage.innerHTML = "<strong>입력한 비밀번호와 비밀번호 확인이 다릅니다.</strong>";
                return false;
            }
            // 모든 검사 통과
            else{
                errorMessage.innerText = "";
                return true;
            }
        }

        function validateWork(){
            let selectWork = document.getElementById("work");
            let errorMessage = document.getElementById("work-error");

            // 아무 직업도 선택하지 않았다면
            if(selectWork.value === "직업명"){
                errorMessage.innerText = "직업을 선택해주세요";

                return false;
            }
            // 직업을 선택했다면
            else{
                errorMessage.innerText = "";

                return true;
            }


        }

        function validateGender(){
            // 성별을 선택할 수 있는 input 라디오 요소를 모두 선택
            let inputGenders = document.getElementsByName("sex");
            // 오류 메세지를 보여줄 요소 선택
            let genderError = document.getElementById("gender-error");

            let checkedGender = false;

            // 모든 input 요소의 라디오를 순회해서 하나라도 체크 되어 있는지 확인
            inputGenders.forEach((e) => {
                if(e.checked){
                    checkedGender = true;
                }
            });

            // 남자, 여자 라디오를 모두 선택 하지 않았다면
            if(!checkedGender){
                // 에러 메세지 출력
                genderError.innerText = "성별을 클릭해서 체크해주세요.";
                return false;
            }
            else{
                // 에러 메세지 삭제
                genderError.innerText = "";
                return true;
            }

        }

        function validateHobby(){
            // 모든 취미 input 요소를 선택함
            let hobbies = document.querySelectorAll(`input[name="hobby"]`);

            // 오류 메세지를 표시할 span 요소 선택
            let errorMessage = document.getElementById("hobby-error");

            // 하나라도 체크가 되어있는지 확인하기 위한 플래그 변수
            let isChecked = false;

            // 모든 체크박스를 확인해서 하나라도 선택되어 있는지 확인
            for(let i = 0; i < hobbies.length; i++){
                if(hobbies[i].checked){
                    // 하나라도 체크되어 있다면 반복문 탈출
                    isChecked = true;
                    break;
                }
            }

            // 체크박스가 하나도 선택되지 않았다면
            if(!isChecked){
                // 에러 메세지 출력
                errorMessage.innerText = "취미를 하나 이상 선택해주세요";
                return false;
            }
            // 체크박스가 하나라도 선택되어 있다면
            else{
                // 에러 메세지 삭제
                errorMessage.innerText = "";
                return true;
            }
        }

        function validateMotivation(){
            // 가입 동기를 입력한 값을 가져오기
            let motivation = document.getElementById("motivation").value;

            // 줄바꿈 기호를 기준으로 값을 나누어 배열에 저장
            let lines = motivation.split('\n');

            // 오류 메시지를 표시할 span 요소 선택
            let errorMessage = document.getElementById("motivation-error");

            // 가입 동기를 입력하지 않았다면
            if(motivation === ""){
                errorMessage.innerText = "가입 동기를 입력해주세요";
                return false;
            } 
            // 가입 동기를 2줄 미만 입력했거나 빈 문자열이 있을 경우
            else if(lines.length < 2 || lines.some(line => line.trim() === "")){
                errorMessage.innerText = "가입 동기를 공백 없이  2줄 이상 입력해주세요";
                return false;
            }
            // 가입 동기를 2줄 이상 입력했다면
            else{
                errorMessage.innerText = "";
                return true;
            }
        }

        // 입력 요소 공통 검사 함수
        function validateField(inputId, errorId, minLength, maxLength, fieldName){
            // 지정한 입력 요소에 입력한 문자열 가져오기
            let input = document.getElementById(inputId).value.trim();

            // 오류 메세지를 보여줄 span 요소 영역
            let errorMessage = document.getElementById(errorId);

            // 빈 값 검사
            if(input === ""){
                // 입력한 값이 없을 경우 false 반환
                errorMessage.innerText = `${fieldName}을(를) 입력해주세요.`;
                return false;
            }
            // 길이 검사
            else if(input.length < minLength || input.length > maxLength){
                // 길이가 최소값보다 작거나 최대값보다 크면 false 반환
                errorMessage.innerText = `${fieldName}은(는) ${minLength}자 이상 ${maxLength}자 이하로 입력해주세요.`;
                return false;
            }
            // 유효성 검사 통과
            else{
                // 모든 검사 통과시 true 반환
                errorMessage.innerText = ``;
                return true;
            }

        }

        // 이벤트 등록 함수 호출
        setEventListeners();

    </script>
</body>

</html>
