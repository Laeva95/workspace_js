<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/carousel.css">
</head>
<body>
    <p>좌우 화살표를 눌러보세요</p>
    
    <!-- 캐러셀 전체 화면 -->
     <div id="container">
        <!-- 왼쪽 화살표 영역 -->
         <div class="arrow" id="left">
            &lang;
         </div>
         <!-- 오른쪽 화살표 영역 -->
          <div class="arrow" id="right">
            &rang;
          </div>
     </div>
    <script>
        /*
            캐러셀 div 전체 영역을 선택
        */ 
        const container = document.getElementById("container");

        /*
            캐러셀 전체 영역 내부에 보여질 이미지명을 문자열 형태로 배열로 저장
        */ 
        const pics = ["pic-1.jpg", "pic-2.jpg", "pic-3.jpg", "pic-4.jpg", "pic-5.jpg"];

        /*
            캐러셀 전체 영역에 첫번째 보여줄 이미지 표시
        */
        container.style.backgroundImage = `url(images/${pics[0]})`;
    
        /*
            화살표 div 두개를 배열로 선택
        */
        const arrows = document.querySelectorAll(".arrow");

        let i = 0;  // pics 배열의 인덱스
        
        /*
            화살표 div에 click 이벤트 등록
        */
        arrows.forEach(arrow => arrow.addEventListener("click", arrowEvent));

        // 화살표 click 이벤트 핸들러 함수
        function arrowEvent(event){
            let dir = event.target.id;
            let max = pics.length - 1;
            
            // 좌측 화살표 클릭 시
            if(dir === "left"){
                // 인덱스 값 1 감소
                i--;

                // 인덱스 값이 0보다 작다면
                if(i < 0){
                    // 최대값으로 설정
                    i = max;
                }
            }
            // 우측 화살표 클릭 시
            else if(dir === "right"){
                // 인덱스 값 1 증가
                i++;

                // 인덱스 값이 최대값보다 크다면
                if(i > max){
                    // 0으로 설정
                    i = 0;
                }
            }
            // 바뀐 인덱스 값으로 이미지 변경
            container.style.backgroundImage = `url(images/${pics[i]})`;
        }

    </script>
</body>
</html>
