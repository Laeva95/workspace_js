<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 복합대입연산자
        //  +=, -=. *=, /=, %=
        let number = 10;
        
        number = number + 10;               // number = 10 + 10 = 20
    
        number += 10;                       // number = 20 + 10 = 30

        document.write(number, "<br>");     // 30 출력

        number -= 10;                       // number = 30 - 10 = 20

        document.write(number, "<br>");     // 20 출력

        number *= 10;                       // number = 20 * 10 = 200

        document.write(number, "<br>");     // 200 출력

        number /= 10;                       // number = 200 / 10 = 20

        document.write(number, "<br>");     // 20 출력

        number %= 10;                       // number = 20 % 10 = 0

        document.write(number, "<br>");     // 0 출력

    </script>
</body>
</html>
