<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            주제: typeof 연산자와 삼항조건연산자식을 함께 사용하는데
                변수의 자료형에 따라서 다른 동작을 수행하는 예제
        */
        const varA ="안녕하세요";

        typeof varA === "string" ? console.log("문자열") : console.log("문자열아님");

    </script>
</body>
</html>
