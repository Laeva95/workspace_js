<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let numberA = 2;
        let numberB = 2;
        let numberC = "2";

        console.log(numberA == numberB);        // true 값 비교
        console.log(numberA == numberC);        // true 값 비교

        console.log(numberA === numberB);       // true 값, 자료형 비교
        console.log(numberA === numberC);       // false 값, 자료형 비교


    </script>
</body>
</html>
