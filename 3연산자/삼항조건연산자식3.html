<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            세 개의 숫자 중에서 가장 큰 수를 삼항조건연산자식으로 구하는 예
            삼항조건연산자식 내부에서 다시 삼항조건연산자식 사용 가능
        */
        
        const num1 = 10;
        const num2 = 20;
        const num3 = 15;

        const max = (num1 > num2) ? 
        (num1 > num3 ? num1 : num3) : 
        (num2 > num3 ? num2 : num3);
        console.log(max);
    </script>
</body>
</html>
