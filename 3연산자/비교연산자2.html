<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <script>
    let a = 10;
    let b = 20;
    let c = 10;
    let d = "20";
    let result;

    // a가 b보다 큰가?
    result = a > b;
    console.log(result);                    // false

    // a가 b보다 작은가?
    result = a < b;
    console.log(result);                    // true

    // b와 d의 값이 같은가?
    result = b == d;
    console.log(result);                    // true

    // a와 b의 값이 다른가?
    result = a != b;
    console.log(result);                    // true

    // b와 d의 값과 자료형이 같은가?
    result = b === d;
    console.log(result);                    // false

    // b와 d의 값과 자료형이 하나라도 다른가?
    result = b !== d;
    console.log(result);                    // true

   </script> 
</body>
</html>
