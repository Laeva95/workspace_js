<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            함수 선언 방법
            1. 함수 선언문 function 함수명(){}방식으로 만들기
            -> 호이스팅 가능

            2. 함수 표현식 const 상수명 = function(){}방식으로 만들기
            -> 호이스팅 불가능

            3. 화살표 함수 const 상수명 = () => {}방식으로 만들기
            -> 호이스팅 불가능


        */

        printHello();           // 함수 선언문이 호이스팅 되기 때문에 함수 선언문보다 위에서도 호출 가능

        function printHello(){
            console.log("Hello");
        }

        // --------------------------------------------------------------------

        // var number 가 호이스팅 되어 선언된 것으로 처리

        console.log(number);        // undefined

        var number = 10;

        console.log(number);        // 10

    </script>
</body>
</html>
