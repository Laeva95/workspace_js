<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            1. 매개변수가 있는 함수 선언
                function 함수명(매개변수1, 매개변수2){
                    함수 내용;
                    return 반환값;
                }

            2. 인수를 전달하는 함수 호출
                함수명(인수1, 인수2);

            3. 기본값이 있는 매개변수
                function 함수명(매개변수1 = 기본값1, 매개변수2 = 기본값2){
                    함수 내용;
                    return 반환값;
                }
            
            4. 이 실습의 핵심
                인수를 전달하지 않으면 매개변수에는 undefined가 전달됨
                전달한 인수를 받을 매개변수가 없으면 그 인수는 함수 내부에서 사용할 수 없음
                매개변수에 기본값을 작성하면 인수가 없을 때 기본값이 사용됨
        */

        // 1. x 함수 선언
        function x(a, b){
            console.log(a, b);
        }

        // 2. x 함수 호출
        x(1, 2);

        // 3. y 함수 선언
        function y (num1, num2){
            console.log(num1, num2);
        }

        // 4. y 함수 호출
        // 기본값이 없는 매개변수에 인수를 전달하지 않아서 undefined 값을 가짐
        y();

        // 5. z 함수 선언
        function z(){
            console.log();
        }

        // 6. z 함수 호출
        // 10과 20을 인수로 전달하지만 매개변수가 없기 때문에 함수 내부에서 사용할 수 없음
        // 에러가 발생하지 않음
        z(10, 20);

        console.log('----------------------------------------------');

        // 7. 매개 변수가 두 개인 화살표 함수 선언
        const s = (num1, num2) => console.log(num1, num2);

        // 8. 화살표 함수 호출
        s(10, 20);

        // 9. 매개 변수가 한 개인 화살표 함수 선언
        const s2 = num1 => console.log(num1);

        // 10. s2 상수 메모리에 저장된 화살표 함수 호출
        s2(100);

        console.log('----------------------------------------------');

        // 11. 기본값이 저장된 매개변수의 함수 선언
        function sum(a = 10, b = 10){
            console.log(a, b);
        }

        // 12. 인수 없이 호출
        // 기본값 10을 사용해서 함수 호출됨
        sum();

        // 13. 인수를 전달해서 호출
        // 기본값 대신 인수를 사용해서 함수 호출됨
        sum(20, 30);

    </script>
</body>
</html>
