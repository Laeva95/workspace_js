    <script>
        // 두 개의 매개변수로 전달받은 인수의 합을 제공하는 함수
        function sum(num1, num2){
            let result = num1 + num2;

            return result;
        }

        let value = sum(100, 200);

        console.log(value);

        console.log(sum(10, 20));




    </script>
