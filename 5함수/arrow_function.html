<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 화살표 => 함수 정의 후 호출해서 사용하는 예제
        
        // 문제1. 매개변수로 두개의 인수를 전달받아서 두개의 인수 값을 더한
        //          결과값을 반환하는 기능의 화살표 함수 정의
        const add = (a, b) => a + b;

        // 문제 1.1. 3, 5를 인수로 전달받아 8을 반환받아 출력
        console.log(add(3, 5));

        // 문제2. 매개변수로 두개의 인수를 전달받아서 두개의 인수 중에서
        //          큰 값 하나를 반환하는 화살표 함수 정의
        const max = (a, b) => a > b ? a : b;

        // 문제2.1. 7, 10을 인수로 전달해서 더 큰 값 반환받아 출력
        console.log(max(7, 10));

        // 문제3. 매개변수로 전달받은 하나의 인수값(숫자)가 양수인지 확인하는
        //          화살표 함수 정의
        const isPositive = (a) => a > 0;

        // 문제3.1. 5를 인수로 전달해서 true 출력
        console.log(isPositive(5));

        // 문제 3.2. -2를 인수로 전달해서 false 출력
        console.log(isPositive(-2));

        // 문제 4. 숫자1부터 매개변수num으로 전달 받은 하나의 인수값 
        // 까지의 합을 구해서 반환하는 기능의 화살표 함수 정의
        const sumUpTo = (num) => {
            let sum = 0;
            for(let i = 1; i <= num; i++){
                sum += i;
            }
            return sum;
        };

        // 문제 4.1. 5를 인수로 전달해서 1부터 5까지의 합 15를 반환받아 출력
        console.log(sumUpTo(5));

        // 문제 5. 매개변수 num과 매개변수 count를 선언해서 화살표 함수 정의
        //          count 매개 변수로 전달받은 숫자만큼 반복해서 num 매개 변수로 전달받은 값을
        //          반복해서 출력
        const repeatNumber = (num, count) => {
            for(let i = 1; i <= count; i++){
                console.log(num);
            }
        };

        // 문제 5.1. 3, 5를 인수로 전달해서 3을 5번 반복 출력
        repeatNumber(3, 5);

        // 문제 6. 매개변수 num으로 하나의 숫자를 전달받아서 3으로 나눈 나머지가 0이면
        //          true, 아니면 false를 반환하는 기능의 화살표 함수 정의
        const isMultipleofThree = num => num % 3 === 0;

        // 문제 6.1 6을 인수로 전달해서 true를 반환받아서 출력
        console.log(isMultipleofThree(6));

        // 문제 6.2 10을 인수로 전달해서 false를 반환받아서 출력
        console.log(isMultipleofThree(10));


        const isMultipleofThree2 = (num) => {
            return num % 3 === 0;
        };
        console.log(isMultipleofThree2(6));

        console.log(isMultipleofThree2(10));

        
    </script>
</body>
</html>
