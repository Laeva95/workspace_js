<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            0. 함수란?
                실행할 코드를 하나의 이름으로 선언해 두고, 개발자가 코드 실행이 필요할 때마다
                그 이름으로 호출해서 코드를 실행하는 문법.

            1. 함수 선언 방법
                function 함수명(){
                    함수내용
                }

            2. 함수 호출
                함수명();    // -> 함수 내용 실행

            3. 핵심
                함수 선언은 실행할 코드를 준비하는 단계
                함수는 선언만 해서는 실행되지 않음
                함수를 호출해야 함수내용이 실행됨
        */

        // 함수 없이 구구단을 직접 출력
        console.log("3 x 1 = 3");
        console.log("3 x 2 = 6");
        console.log("3 x 3 = 9");
        console.log("3 x 4 = 12");
        console.log("3 x 5 = 15");
        console.log("3 x 6 = 18");
        console.log("3 x 7 = 21");
        console.log("3 x 8 = 24");
        console.log("3 x 9 = 27");

        console.log("---------------------------------------");

        // for 반복문으로 구구단 출력
        for(let i = 1; i <= 9; i++){
            console.log(`3 x ${i} = ${3 * i}`);
        }

        console.log("---------------------------------------");

        // 함수를 이용해서 구구단 출력
        function gugudan(number){
            if(typeof number != "number"){
                return;
            }
            for(let i = 1; i <= 9; i++){
            console.log(`${number} x ${i} = ${number * i}`);
            }
        }
        gugudan(3);
        gugudan(12);
        gugudan("a");

    </script>
</body>
</html>
