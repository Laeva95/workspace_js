<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            스코프 - 변수나 함수를 사용할 수 있는 코드 범위 영역

            -----전역 스코프-----
            let 변수명 = 값;        <-- 전역 변수

            function 함수명(){
                -----지역 스코프-----
                let 변수명 = 값;    <-- 지역 변수

            }
        */

        // ---------- 전역 스코프 영역
        let a = 10;             // <--- 전역 변수

        function sum(){
            // ------ 지역 스코프 영역(함수 내부 영역)
            // 지역 스코프 영역에서는 전역 변수 사용 가능
            console.log(`함수 내부 : ${a}`);

        }

        sum();

        console.log(`함수 외부 : ${a}`);

        console.log("------------------------------------------------");

        function sum2(){
            // ------ 지역 스코프 영역(함수 내부 영역)
            let b = 10;         // <--- 지역 변수

            console.log(`함수 내부 영역 : ${b}`);
        }

        sum2();

        console.log(`함수 외부 영역 : ${b}`);

        // 결론: 함수 내부에서 선언한 변수 b는 지역 스코프 영역에 선언한 지역변수
        //      따라서 함수 내부가 아닌 외부에서 변수 b를 사용하려고 하면 에러 발생

    </script>
</body>
</html>
