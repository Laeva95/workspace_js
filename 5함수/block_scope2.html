<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 변수를 만들 때 사용하는 예약어 let, var

        // var 변수명 = 10;    // 자바스크립트의 이전 문법에서 사용하던 예약어
        // let 변수명 = 100;   // 자바스크립트의 현재 문법에서 사용하는 예약어

        // var는 같은 이름의 변수를 선언할 수 있다는 위험성이 있음
        // let은 같은 이름의 변수를 선언할 수 없음

        // var num = 10;

        // var num = 100;

        // let number = 10;

        // let number = 100;

        // 블록문을 기준으로 전역 스코프 영역에 전역 변수 a 선언
        var a = 10;

        {
            // 지역 스코프 영역
            var b = 20;

            console.log(`블럭 내부 영역 a: ${a}`);
            console.log(`블럭 내부 영역 b: ${b}`);
        }
        
        // 외부 영역에서도 에러가 발생하지 않음
        // var 변수의 값은 블럭문 내부에 작성하더라도 ${b}에서 사용하는 시점에 웹 브라우저가
        // 위로 끌어 올려 선언하기 때문에 전역 변수처럼 사용 가능
        console.log(`블럭 외부 영역 a: ${a}`);
        console.log(`블럭 외부 영역 b: ${b}`);

        var c = 10;

        console.log(c);


    </script>
</body>
</html>
