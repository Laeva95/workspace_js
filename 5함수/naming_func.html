<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            함수 표현식 1.
                const 상수명 = function 함수명(매개변수1, 매개변수2){

                    함수 내용;

                    return 반환값;
                };

            함수 표현식 2.
                const 상수명 = function(매개변수1, 매개변수2){
                
                    함수 내용;

                    return 반환값;
                }



            상수명(인자1, 인자2);
        */


        // 실습 1. 함수 표현식 작성 방법으로 구구단 출력
        // naming이라는 이름이 존재하는 함수 형태
        const gugudan = function naming(){
            for(let i = 1; i <= 9; i++){
                console.log(`3 x ${i} = ${3 * i}`);
            }
        };

        // 실습 2. 위의 naming 함수 호출(상수명을 통해 호출)
        gugudan();

        // 실습 3. 함수 표현식 익명 작성 방법으로 구구단 출력
        const gugudan2 = function(){
            for(let i = 1; i <= 9; i++){
                console.log(`4 x ${i} = ${4 * i}`);
            }
        };

        // 실습 4. 위의 익명 함수 호출(상수명을 통해 호출)
        gugudan2();

        /*
            const 예약어를 사용하는 이유는 의도치 않게 함수를
            변경할 수 없도록 하기 위함.
        */

    </script>
</body>
</html>
