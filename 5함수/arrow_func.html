<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            화살표 함수를 만드는 방법
                const 상수명 = (매개변수1, 매개변수2) => { 
                    함수 내용;
                    return 반환값;
                };

                상수명();
        */

        // 구구단 3단을 출력하는 화살표 함수
        const gugudan = () => {
            for(let i = 1; i <= 9; i++){
                console.log(`3 x ${i} = ${3 * i}`);
            }
        };

        gugudan();


    </script>
</body>
</html>
