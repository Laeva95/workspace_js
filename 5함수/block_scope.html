<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a = 10;         // 전역 변수

        {
            let b = 20;     // 지역 변수

            console.log(`블럭문 내부 지역 스코프에서 전역 변수 값 출력: ${a}`);
            console.log(`블럭문 내부 지역 스코프에서 지역 변수 값 출력: ${b}`);
        }

        console.log(`블럭문 외부 전역 스코프에서 전역 변수 값 출력: ${a}`);
        console.log(`블럭문 외부 전역 스코프에서 지역 변수 값 출력: ${b}`);         // 에러 발생

    </script>
</body>
</html>
