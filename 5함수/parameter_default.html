<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // x 함수 선언
        function x(a, b){
            console.log(a, b);
        }

        // x 함수 호출
        x(1, 2);

        console.log("------------------------------------------");

        // y 함수 선언
        function y(num1, num2){
            console.log(num1, num2);
        }

        // y 함수 호출
        y();


        function z(){
            console.log("매개변수가 없으므로 인수를 전달받아 사용할 수 없다. 하지만 오류는 발생하지 않는다.");
        }

        z(10, 20);

        console.log("---------------------------------------------");

        const s = (num1, num2) => console.log(num1, num2);

        s(10, 20);

        const s2 = num1 => console.log(num1);

        s2(100);



    </script>
</body>
</html>
