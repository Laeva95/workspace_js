<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            함수 선언 방법 2
            
                1. 함수 선언문
                    function funcName(param1, param2){
                        실행할 코드;
                        return 반환값;
                    }

                2. 함수 호출
                    funcName(arg1, arg2);

                3. 핵심
                    함수 선언은 실행할 코드를 준비하는 단계
                    함수 호출은 준비된 코드를 실행하는 단계
                    매개변수는 함수가 값을 받기 위해 선언한 변수
                    인수는 함수를 호출할 때 전달하는 실제 값
                    return은 함수 코드 실행 결과값을 반환하는 예약어
        */

        // 문제1. 두 수를 더해서 반환하는 add 함수 선언
        function add(a, b){
            // 매개 변수 a와 b의 합을 반환
            return a + b;
        }

        // add 함수 호출
        // 3, 5가 매개변수 자리에 전달
        console.log(add(3, 5));


    </script>
</body>
</html>
