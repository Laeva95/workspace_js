<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            let 변수 = 초기값               // 변수에 조건을 판단하는 조건 초기값

            while(조건식){                 // 그 다음 while문을 작성해 사용
                    실행문;

                    증감식;
            }

            조건식 -> 실행문 -> 증감식
            -> 조건식 -> 실행문 -> 증감식을 계속 반복하며 조건식을 만족하지 않는 순간 종료됨
        */

        // i 변수의 값이 10보다 작거나 같다면 실행

        let i = 1;

        /*
            i의 값이 1부터 시작하고 1씩 증가하는 형태
            i가 10보다 작거나 같다면 실행하므로 11이 되는 순간 반복문 종료

            i가 계속 증가하므로 출력되는 값은

            안녕하세요1
            안녕하세요2
            안녕하세요3...

            으로 계속 1씩 증가
        */
        while(i <= 10){

            document.write("안녕하세요" + i, "<br>");
            
            i++;
        }

    </script>
</body>
</html>
