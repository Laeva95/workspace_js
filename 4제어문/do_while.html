<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            사이트 이용자가 입력한 숫자가 10 이상이 될 때까지 계속 반복해서 입력을 받는 프로그램
        */

        let number;                     // 입력받은 숫자가 저장될 변수

        let i = 0;                          // 사이트 이용자가 입력한 횟수가 저장될 변수

        do {
            // 무조건 한번 실행 후 조건식을 만족하면 반복 실행

            /* 
                사이트 이용자로부터 숫자를 반복해서 입력 받고, 입력 받은 숫자 형태의 문자열을
                정수 숫자로 변경해서 number 변수에 저장
            */
            number = parseInt(prompt("숫자 정수를 입력하세요(10 이상).", "0"));

            // 입력 받은 숫자가 10보다 작을 경우 메세지 출력
            if(number < 10){
                alert(`${++i}번째 입력한 숫자가 10보다 작습니다. 다시 입력해주세요.`);
            }

        } while (number < 10);          // number가 10보다 작다면 반복 실행

        // 이 줄의 코드부터는 입력 받은 숫자가 10 이상임을 알리고 프로그램 종료
        document.write(`${++i}번째 입력한 숫자는 ${number}입니다. 프로그램을 종료합니다.`);

    </script>
</body>
</html>
