<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script type="text/javascript">
        /*
            while 반복문을 사용해서 숫자 1부터 30까지의 숫자 중에서 2의 배수면서 6의 배수만 숫자만 출력
        */

        // 초기값 1
        let i = 1;

        // 조건식 <= 30
        while(i <= 30){
            // 2의 배수면서 6의 배수인 값 출력
            if(i % 2 === 0 && i % 6 === 0){
                document.write(`현재 i: ${i}<br>`);
            }

            // i 1을 더함
            i++;
        }

    </script>
</body>
</html>
