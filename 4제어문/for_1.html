<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            for 반복문 작성 문법
            
            for(초기식; 조건식; 증감식){
                실행문;
            }
        */

        // "반복" 문자열을 10번 반복해서 출력
        for(let i = 1; i <= 10; i++){
            document.write("반복<br>");
            /*
                반복
                반복
                반복
                반복
                반복
                반복
                반복
                반복
                반복
                반복
            */
        }

        /*
            동작 순서
            1. 초기식: let i = 1;
            2. 조건식: i <= 10;
            3. 실행문: document.write("반복<br>");
            4. 증감식: i++
            5. 조건식: i <= 10;
            6. 실행문: document.write("반복<br>");
            7. 증감식: i++

            ...

            조건식을 만족하지 않을 경우 for문 종료
        */


    </script>
</body>
</html>
