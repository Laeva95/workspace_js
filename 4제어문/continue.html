<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            for 반복문에서 continue 예약어를 사용하여
            1부터 10까지의 숫자 중에서 홀수만 출력
        */

        // i는 1부터 10까지
       for (let i = 1; i <= 10; i++) {
            // i가 짝수라면 다음 반복으로 이동
            if(i % 2 === 0){
                continue;
            }
            // i가 짝수가 아니라면 브라우저에 출력
            document.write(i, "<br>");
       }
        
    </script>
</body>
</html>
