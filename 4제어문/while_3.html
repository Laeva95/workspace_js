<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            while 반복문을 사용해서 팩토리얼을 계산하는 웹 애플리케이션
            
            팩토리얼: 1부터 주어진 정수 숫자까지 곱한 결과
            3! = 1 * 2 * 3 => 6
        */

        
        // 문제: 사이트 이용자에게 입력 받은 정수 숫자까지의 팩토리얼 값을 구해서 출력

        let n = prompt("1 이상의 정수를 입력하세요", 1);

        // 사이트 이용자에게 입력 받은 값을 저장할 변수

        let msg = "";

        // 실제로 값을 입력 받았는지 확인

        if (n != null) {
            // 팩토리얼 계산 결과 값을 저장할 변수
            let nFact = 1;

            // 조건 변수
            let i = 1;

            // 조건 변수가 입력 받은 값보다 작거나 같다면 반복 실행
            while (i <= n) {
                nFact *= i;

                i++;
            }
            msg = n + "! = " + nFact;
        } else{
            // 입력한 값이 없을 경우
            msg = "숫자를 입력하지 않았거나, 취소 버튼을 눌렀습니다";
        }
        document.write(msg);

    </script>
</body>
</html>
