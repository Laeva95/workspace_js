        // prompt를 통해 몇월인지 입력 받음
        let mon = prompt("현재 몇월인지 입력하세요.", "0");
        // 메세지를 저장할 msg 변수
        let msg = "";

        switch (mon) {
            // 3,4,5 = "봄"
            case "3":
            case "4":
            case "5":
                msg = "봄";
                break;
            // 6,7,8 = "여름"
            case "6":
            case "7":
            case "8":
                msg = "여름";
                break;
            // 9,10,11 = "가을"
            case "9":
            case "10":
            case "11":
                msg = "가을";
                break;
            // 12,1,2 = "겨울"
            case "12":
            case "1":
            case "2":
                msg = "겨울";
                break;
            // 그 외 유효하지 않은 값
            default:
                msg = "유효하지 않은 값입니다.";
                break;
        }
        document.write(msg);
    </script>
