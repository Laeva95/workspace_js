<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            for 반복문을 작성해서 20번 반복해서 "안녕" 출력
        */

        let i;

        for(i = 0; i < 20; i++){
            document.write("안녕<br>");
        }

        document.write(i);

    </script>
</body>
</html>
