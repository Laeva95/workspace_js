<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            사이트 방문자에게 좋아하는 숫자 하나를 입력받아
            입력받은 숫자가 짝수인지 홀수인지 if, else 조건문을 사용하여 판단
            짝수일 경우 "당신이 좋아하는 숫자는 짝수입니다."
            홀수일 경우 "당신이 좋아하는 숫자는 홀수입니다."
            웹 브라우저 화면에 출력
        */

        // 사이트 방문자에게 좋아하는 숫자 입력받기
        let num = prompt("당신이 좋아하는 숫자를 입력하세요.");

        // 입력받은 숫자가 짝수인지 확인
        if (num % 2 === 0) {
            // 입력받은 숫자가 짝수일 경우 실행
            document.write("당신이 좋아하는 숫자는 짝수입니다.");
        } else if(num % 2 === 1) {
            // 입력받은 숫자가 홀수일 경우 실행
            document.write("당신이 좋아하는 숫자는 홀수입니다.");
        } else {
            // 입력받은 숫자가 짝수, 홀수가 아닐 경우 즉, 숫자가 아닐 경우 실행
            document.write("입력한 값이 숫자가 아닙니다.");
        }
    </script>
</body>
</html>
