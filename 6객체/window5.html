<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            moveTo(): 현재 웹브라우저 창을 모니터 화면의 특정 위치로 이동
                    매개변수로 x, y값을 넣을 수 있음
                    x: 화면의 왼쪽부터 떨어진 거리
                    y: 화면의 위쪽부터 떨어진 거리
        */

        window.moveTo(100, 100);


    </script>
</body>
