<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>


    <script>
        // 1. 유사 배열 객체
        //      length 속성을 갖고 index 번호로 요소에 접근할 수 있음
        const arrayLike = { 0:'a', 1:'b', 2:'c', length:3};

        // 유사 배열 객체를 일반 배열로 변환
        const arr = Array.from(arrayLike);

        // 일반 배열 메서드 사용 가능
        arr.forEach(charValue => document.write(charValue, "<br>"));


        // 2. 반복 가능한 객체
        //      Symbol.iterator 메서드를 가진 객체
        const set = new Set(['a', 'b', 'c']);

        // 반복 가능한 객체를 일반 배열로 변환
        const arrSet = Array.from(set);

        // 일반 배열 메서드 사용 가능
        arrSet.forEach(setValue => document.write(setValue, "<br>"));
        
    </script>
</body>
</html>
