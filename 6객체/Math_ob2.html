<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        document.write("<h1>컴퓨터가 랜덤으로 내는 가위, 바위, 보 중 하나를 맞추는 게임</h1>");

        let t = prompt("가위, 바위, 보 중에서 하나를 입력하세요.", "가위");
        let tNum;

        switch (t) {    // 알맞은 답을 입력했을 경우 tNum에 값 입력
            case "가위":
            tNum = 1;
                break;
            case "바위":
            tNum = 2;
                break;
            case "보":
            tNum = 3;
                break;        
            default:    // 잘못된 답을 입력했을 경우 사이트 재요청
                alert("잘못된 답을 입력했습니다.");
                location.reload();
                break;
        }
        // 1~3의 정수값을 무작위로 생성
        let com = Math.ceil(Math.random() * 3);

        document.write("<img src=images/math_img_" + com + ".jpg alt=가위바위보>");
        
        if(tNum === com){       // tNum과 com의 동일 유무를 판단해서 정답을 맞췄는지 확인
            alert("정답입니다!");
        }else if(tNum !== com){
            alert("틀렸습니다!");
        }

        
        


    </script>
</body>
</html>
