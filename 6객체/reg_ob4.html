<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            이메일을 제대로 입력했는지 확인
        */
        let userEmail = prompt("이메일을 입력해주세요");

        /*
            정규표현식 객체 생성
            5~12자 사이의 영문자, 숫자, 또는 밑줄로 시작하고,
             @기호가 사이에 있고,
            2~10자 사이의 소문자 알파벳,
            . 기호,
            2~3자 사이의 소문자 알파벳,
            선택적으로 . 기호
            0~2자 사이의 소문자 알파벳
        */
        let reg = /^\w{5,12}@[a-z]{2,10}[\.][a-z]{2,3}[\.]?[a-z]{0,2}$/;

        while(true){
            if(reg.test(userEmail)){
                break;
            } else{
                alert("다시 입력해주세");
            }
            userEmail = prompt("이메일을 입력해주세요");
        }


    </script>
</body>
</html>
