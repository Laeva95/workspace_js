<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    



    <script>
        // window.onload = function(){}
        window.onload = function(){
            // HTML 요소를 문자열로 직접 작성해서 body 태그 안에 한번에 추가하는 방식

            // 1. 추가할 HTML 요소 노드들을 문자열로 작성
            const html = '<a href="https://www.gilbut.co.kr">길벗</a>';

            // 2. 추가한 요소를 body 태그에 사이에 추가
            document.body.innerHTML = html;
        }
    </script>
</body>
</html>
