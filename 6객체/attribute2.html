<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .red-color{
            color: red;
        }
    </style>
</head>
<body>
    <a href="https://www.naver.com" data-link="네이버">네이버</a>

    <script>
        /*
            getAttribute, setAttribute 메서드는
            classList, dataset 속성으로 할 수 있는 일을 모두 할 수 있음
        */
        const aEl = document.querySelector("a");

        // 기존 속성 변경
        // aEl.dataset.link = "네이버2";
        aEl.setAttribute("data-link", "네이버2");

        // 새 속성 추가
        // aEl.classList.add("red-color");
        aEl.setAttribute("class", "red-color");


        /*
            같은 작업을 여러 방식으로 할 수 있음

            1. setAttribute()

            2. classList.add()

            3. dataset.*
        */


    </script>
</body>
</html>
