<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            사이트 이용자에게 입력받은 이름이 2 ~ 5자 사이의 한글로만 입력했는지 검사
        */

        let userName = prompt("2~5글자의 한글로 이름을 입력해주세요.");

        let reg1 = /^[가-힣]{2,5}$/
        /*
            ^[가-힣]: 한글의 음절 범위를 지정한 것으로 모든 한글을 뜻함. 즉 한글로만 입력했는지 확인할 때 사용하는 패턴
            {2,5}: 글자수를 2자~5자로 제한하는 패턴
            $: 문자열의 끝을 나타내는 기호
        */

        while(true){
            if(reg1.test(userName)){
                break;
            }else{
                alert("2~5글자의 한글로 이름을 입력해주세요.");
            }
            userName = prompt("2~5글자의 한글로 이름을 입력해주세요.");
        }

    </script>
</body>
</html>
