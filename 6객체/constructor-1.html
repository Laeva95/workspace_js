<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /*
            같은 속성 구조를 가진 객체 메모리들을 효율적으로 생산하기 위한 함수
            new 키워드와 함께 호출해서 사용

            function 생성자함수명(매개변수1, 매개변수2){
                this.속성명1 = 매개변수1;
                this.속성명2 = 매개변수2;

                this.메소드명1 = function(){
                    메소드 내용;
                };
            }
            
            let 객체참조변수명 = new 생성자함수명(인수1, 인수2);
        */

        /*
            생성자 함수로 같은 구조의 객체 메모리들 생성
        */
       function Member(id, name, age){
            this.id = id;
            this.name = name;
            this.age = age;

            this.introduce = function(){
                document.write(`아이디: ${this.id}<br>이름: ${this.name}<br>나이: ${this.age}<br><br>`);
            }
       }

       // new 키워드를 이용해서 Member 생성자 함수 호출
       let member1 = new Member("user01", "홍길동", 20);
       member1.introduce();

       // 생성자 함수를 호출해서 여러 객체 변수 생성
       let member2 = new Member("user02", "김자바", 25);
       member2.introduce();






    </script>
</body>
</html>
