<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        window.onload = () => {
            // body 태그의 모든 자식 요소를 NodeList(유사 배열)로 가져옴
            const nodes = document.body.childNodes;

            // 유사 배열을 일반 배열로 변환
            // Array 객체의 from(NodeList)를 통해 일반 배열로 변환
            const nodeArr = Array.from(nodes);

            // nodeArr 배열의 모든 a 태그를 삭제
            nodeArr.forEach(node => {
                if(node.nodeName === "A"){
                    node.parentNode.removeChild(node);
                }
            });

        }
    </script>
</head>
<body>
    <p>text 1</p>

    <a href="https://www.gilbut.co.kr">길벗</a>

    <a href="https://www.google.co.kr">구글</a>
</body>
</html>
