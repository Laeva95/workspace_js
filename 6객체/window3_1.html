        // 현재 년 월 일 시 분 초 정보를 제공하는 기능의 함수
        function time(){
            let date = new Date();
            
            let currentTime = date.getFullYear() + "년 "
                            + (date.getMonth() + 1) + "월 "
                            + date.getDate() + "일 "
                            + date.getHours() + "시 "
                            + date.getMinutes() + "분 "
                            + date.getSeconds() + "초";

            document.write(currentTime, "<br>");
        }
        window.setInterval(time, 1000);



    </script>
