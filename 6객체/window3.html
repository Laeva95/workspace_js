<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let i = 0;

        // 3초 간격으로 i++ 실행문 반복 실행

        let auto = window.setInterval("console.log(i++);", 3000);


    </script>

    <button onclick="window.clearInterval(auto);">정지버튼</button>
</body>
</html>
