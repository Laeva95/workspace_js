<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="printInfo();">버튼</button>
    <script>
        // 사이트 이용자가 버튼 클릭시 호출되는 함수
        function printInfo(){
            document.write(`웹 브라우저창 너비: ${window.innerWidth}`);
            document.write(`웹 브라우저창 높이: ${window.innerHeight}`);

            document.write(`웹 브라우저창 위쪽 면과 모니터 사이의 간격: 
            ${window.screenTop}, ${window.screenY}<br>}`);
            document.write(`웹 브라우저창 왼쪽 면과 모니터 사이의 간격: 
            ${window.screenLeft}, ${window.screenX}<br>}`);
        }
    </script>
</body>
</html>
