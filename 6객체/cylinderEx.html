<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/cylinder.css">
    <title>Document</title>
</head>
<body>
    <div id="container">
        <div id="userInput">
            <ul>
                <li>
                    <label for="radius">반지름</label>
                    <Input type="text" id="radius" value="5"></Input>
                </li>
                <li>
                    <label for="height">높이</label>
                    <Input type="text" id="height" value="10"></Input>
                </li>
                <li>
                    <!-- 
                        사이트 이용자가 <button>을 클릭하는 동작을 등록
                        ->  onclick
                        클릭하는 동작 등록 후 기능을 실행하기 위한 함수 호출
                        ->  ="함수명()";
                    -->
                    <button onclick="calcByConstructor();">생성자</button>
                </li>
                <li>
                    <button onclick="calcByClass();">클래스</button>
                </li>
            </ul>
        </div>
        <div id="result">
            결과 출력 영역
        </div>
    </div>
    <script>
        // id="radius" 태그에서 반지름 값을 가져오는 함수
        // 문자열로 가져오기 때문에 Number()함수를 통해 number 타입으로 변환
        function getRadius(){
            return Number(document.querySelector("#radius").value);
        }
        // id="height" 태그에서 높이 값을 가져오는 함수
        // 문자열로 가져오기 때문에 Number()함수를 통해 number 타입으로 변환
        function getHeight(){
            return Number(document.querySelector("#height").value);
        }
        
        // 계산한 값을0 id="result" 태그의 텍스트로 전달하는 함수
        function setResult(cylinder){
            // getElementById 메소드를 통해 id="result"인 HTML 요소를 가져옴
            const result = document.getElementById("result");

            // 해당 요소의 텍스트로 계산 결과값 전달
            result.textContent = cylinder.getVolume();
        }

        // 원기둥의 부피를 계산하는 함수
        function calcByConstructor(){
            let cylinder = new CylinderConstructor(getRadius(), getHeight());
            setResult(cylinder);
        }
        // 원기둥의 부피를 계산하는 함수
        function calcByClass(){
            let cylinder = new CylinderClass(getRadius(), getHeight());
            setResult(cylinder);
        }

        /*
            원기둥 높이 = 반지름 * 반지름 * PI * 높이
        */
        // 생성자 함수
        function CylinderConstructor(radius, height){
            // 속성
            this.radius = radius;
            this.height = height;

            // 메소드
            this.getVolume = function(){
                // 원기둥 높이 = 반지름 * 반지름 * PI * 높이
                return this.radius * this.radius * Math.PI * this.height;
            };
        }
        // 클래스
        class CylinderClass{
            // 생성자
            constructor(radius, height){
                this.radius = radius;
                this.height = height;
            }
            
            // 메소드
            getVolume(){
                // 원기둥 높이 = 반지름 * 반지름 * PI * 높이
                return this.radius * this.radius * Math.PI * this.height;
            }
        }

        

    </script>
</body>
</html>
