<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form name="frm1">
        <input type="text" name="userid">
    </form>
    <form name="frm2">
        <input type="text" name="username">
    </form>
    <form name="frm3">
        <input type="text" name="usernick">
    </form>

    <script>
        /*
            form 태그를 선택해서 가져오는 방법
                document 최상위 부모 노드 객체를 이용해서 가져올 수 있음
                
                1. form 요소의 name 속성 값을 이용해 가져오기
                2. document 객체의 forms 속성을 이용해 가져오기
        */

        /*
            1. form 요소 노드 선택해서 가져오기
                form 요소의 name 속성 값을 이용해서 가져오기

                document.form_name
        */
        console.log(document.frm1);     // name="frm1" 값인 form 요소 하나를 선택해서 가져옴
        console.log(document.frm2);     // name="frm2" 값인 form 요소 하나를 선택해서 가져옴
        console.log(document.frm3);     // name="frm3" 값인 form 요소 하나를 선택해서 가져옴

        /*
            2. 모든 form 요소 가져오기
                
                document.forms
        */
        const forms = document.forms;

        Array.from(forms).forEach((form) => console.log(form));


    </script>
</body>
</html>
