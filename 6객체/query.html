<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="box-1">
        <p class="text">text-1</p>
        <p class="text">text-2</p>
    </div>
    <div class="box-2">
        <p class="text">text-3</p>
        <p class="text">text-4</p>
    </div>

    <script>
        /*
            querySelector(): CSS 선택자 문법을 통해 요소 하나를 선택해서 가져옴
        */
        const el = document.querySelector(".box-1");

        console.log(el);

        /*
            querySelectorAll(): CSS 선택자 문법을 통해 요소를 모두 가져옴
        */
        
        // ".box-1" 클래스의 자식 요소들 중 ".text" 클래스 요소들을 모두 가져옴
        const el3 = document.querySelectorAll(".box-1 .text");

        console.log(el3[0]);
        console.log(el3[1]);

        // "box-1" 클래스의 모든 자식 요소를 가져옴
        const el2 = document.getElementsByClassName("box-1")[0].children;
        
        console.log(el2[0]);
        console.log(el2[1]);

    </script>
</body>
</html>
