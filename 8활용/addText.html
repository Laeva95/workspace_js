<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="container">
        <h1>상품 설명회</h1>
        <h2>자바스크립트의정석</h2>
        <p>베스트 셀러입니다. 잘나갑니다.</p>
        <button id="order">주문하기</button>
    </div>
    <div id="orderInfo">

    </div>
    <script>
        // 주문 정보를 보여줄 div 요소
        const orderInfo = document.getElementById("orderInfo");

        // 주문하기 button 요소
        const orderButton = document.querySelector("#order");

        // 제목 h2 요소
        const title = document.querySelector("#container > h2");

        // 주문하기 버튼을 클릭했을 때 발생하는 click 이벤트 등록
        orderButton.addEventListener("click", () => {
            // 주문 정보를 보여줄 div 요소의 컨텐츠 영역에 p 요소 한쌍을 추가
            orderInfo.innerHTML += `<p style="font-size:0.8em; color=blue">${title.textContent}</p>`
        });

    </script>
</body>
</html>
