<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Web Programming</h1>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>

    <script>
        // h1 요소 노드 선택
        const title = document.querySelector("h1");

        // click 이벤트 등록
        // 이벤트 발생 시 title 요소 삭제
        title.addEventListener("click", () => title.remove());

    </script>
</body>
</html>
